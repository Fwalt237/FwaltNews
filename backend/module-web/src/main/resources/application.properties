spring.application.name=FwaltNews

spring.datasource.url = jdbc:postgresql://localhost:5432/fwaltnewsdb
spring.datasource.username = postgres
spring.datasource.password = ${spring.db.password}
spring.datasource.driverClassName = org.postgresql.Driver
spring.jpa.database-platform = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.baseline-on-migrate=true
spring.profiles.active = ${SPRING_PROFILES_ACTIVE:dev}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.mvc.pathmatch.matching-strategy=ant-path-matcher

jwt.secret=${secret}
jwt.expiration=86400000 

spring.security.oauth2.client.registration.google.client-name=FwaltNews
spring.security.oauth2.client.registration.github.client-name=FwaltNews

spring.security.oauth2.client.registration.github.client-id=${github.client.id}
spring.security.oauth2.client.registration.github.client-secret=${github.client.secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

spring.security.oauth2.client.registration.google.client-id=${google.client.id}
spring.security.oauth2.client.registration.google.client-secret=${google.client.secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

newsdata.api.key=${api.key}
spring.task.scheduling.pool.size=2

spring.ai.google.genai.api-key=${Gemini_API_Key}
spring.ai.google.genai.chat.options.model=gemini-3.1-flash-lite
spring.ai.google.genai.embedding.text.options.model=gemini-embedding-001
app.ai.max-history-turns=5

gemini.api-key=${Gemini_API_Key}
gemini.embedding-model=https://generativelanguage.googleapis.com/v1beta/models/gemini-embedding-001:embedContent

management.endpoints.web.exposure.include=health,info,prometheus
management.prometheus.metrics.export.enabled=true
management.observations.key-values.application=fwaltnews

